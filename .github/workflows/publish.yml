name: Publish

on:
  push:
    tags:
      - "modbus-bridge-v[0-9]+.[0-9]+.[0-9]+"

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  # Gate: full test suite must pass before we touch crates.io
  test:
    name: Test suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --features async
      - run: cargo test --features tokio-integration --test tokio_integration
      - run: cargo test --no-default-features --features sync

  # Validate the package exactly as crates.io will see it
  dry-run:
    name: Publish dry-run
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Verify package
        run: cargo publish --dry-run --features async

  # Actual publish — only after both gates pass
  publish:
    name: Publish to crates.io
    needs: [test, dry-run]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish
        run: cargo publish --features async
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
