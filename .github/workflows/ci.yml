name: CI

on:
  push:
    branches: [main]
  pull_request:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Unit + integration tests (async)
        run: cargo test --features async

      - name: Tokio integration tests
        run: cargo test --features tokio-integration --test tokio_integration -- --nocapture

  test-sync:
    name: Test (sync feature)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Unit + integration tests (sync)
        run: cargo test --no-default-features --features sync

  msrv:
    name: MSRV (1.81)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.81"
      - uses: Swatinem/rust-cache@v2

      - name: Check (async)
        run: cargo check --features async

      - name: Check (sync)
        run: cargo check --no-default-features --features sync

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2

      - run: cargo clippy --features async -- -D warnings
      - run: cargo clippy --no-default-features --features sync -- -D warnings

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --check

  no-std:
    name: no_std check (thumbv7em-none-eabi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2

      - name: Check async (no_std)
        run: cargo check --target thumbv7em-none-eabi --features async

      - name: Check sync (no_std)
        run: cargo check --target thumbv7em-none-eabi --no-default-features --features sync
